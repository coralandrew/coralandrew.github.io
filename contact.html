<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Contact | Andrew Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Darken form inputs to match dark theme */
    .form-control {
      background-color: #1a1a1a;
      border: 1px solid #444;
      color: #fff;
      font-size: 0.95rem;
      /* 44px min touch height */
      min-height: 44px;
    }
    .form-control:focus {
      background-color: #1a1a1a;
      border-color: #ffc107;
      color: #fff;
      box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
    }
    .form-control::placeholder {
      color: #888;
    }
    .form-label {
      color: #ccc;
      font-size: 0.9rem;
    }

    /* Contact section top padding clears navbar + safe area */
    .contact-section {
      padding-top: calc(52px + env(safe-area-inset-top, 0px) + 30px);
      padding-bottom: 60px;
    }

    @media (max-width: 390px) {
      .contact-section h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black fixed-top shadow">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="index.html">
        <img src="logo.png" alt="MyPortfolio Logo">
      </a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="activities.html">Activities</a></li>
          <li class="nav-item"><a class="nav-link text-warning" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contact Section -->
  <section class="contact-section bg-dark text-white">
    <div class="container">
      <h2 class="text-warning text-center mb-4">Contact Me</h2>
      <form action="https://formspree.io/f/mwkgzxyz" method="POST"
        class="mx-auto" style="max-width: 600px;">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name" placeholder="Your Name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="_replyto" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" name="message" rows="4"
            placeholder="Your message..." required style="min-height: 100px;"></textarea>
        </div>
        <button type="submit" class="btn btn-warning w-100">Send Message</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-black text-center text-white py-3">
    <p class="mb-0">&copy; <span class="footer-year"></span> Andrew Coral. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll(".footer-year").forEach(el => el.textContent = new Date().getFullYear());
  </script>
</body>
</html>
